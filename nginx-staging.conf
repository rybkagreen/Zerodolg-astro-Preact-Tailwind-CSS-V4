user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Security headers for staging
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP для staging с учетом Bitrix24, Google Analytics и Яндекс.Метрики
    # Note: 'unsafe-inline' для style-src необходим для inline стилей Astro
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://www.google-analytics.com https://www.googletagmanager.com https://mc.yandex.ru https://mc.yandex.com https://yandex.ru https://yandex.com https://*.yandex.ru https://*.yandex.com https://cdn.jsdelivr.net https://cdn.bitrix24.ru https://cdn-ru.bitrix24.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com https://yandex.ru https://yandex.com https://*.yandex.ru https://*.yandex.com wss://mc.yandex.ru https://zerodolg.bitrix24.ru https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://www.google.com https://www.googletagmanager.com https://yandex.ru https://yandex.com https://mc.yandex.ru https://mc.yandex.com https://*.yandex.ru https://*.yandex.com;" always;

    # Server configuration for staging (HTTP only)
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Charset
        charset utf-8;

        # Logging
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Extended caching for static assets with immutable headers
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|mp4|webm|ogg|ogv|eot|ttf|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept;
            access_log off;
        }

        # Cache CSS/JS with version hashing
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # Cache Astro assets with immutable headers
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # HTML файлы - не кэшируем
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # API endpoints - proxy to SSR server
        location /api/ {
            proxy_pass http://localhost:4321;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Основное правило - SPA routing
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # Специальные файлы
        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        location = /sitemap.xml {
            access_log off;
        }

        location = /sitemap-index.xml {
            access_log off;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Запрет доступа к скрытым файлам
        location ~ /\\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages (опционально)
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}