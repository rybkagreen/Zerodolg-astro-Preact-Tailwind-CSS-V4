user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Brotli compression (если модуль установлен)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers with HSTS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # CSP header - настроено для zerodolg.ru
    # Note: 'unsafe-inline' для style-src необходим для inline стилей Astro. Для лучшей безопасности рекомендуется уменьшить inline styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://www.googletagmanager.com https://www.google-analytics.com https://mc.yandex.ru https://mc.yandex.com https://yandex.ru https://yandex.com https://*.yandex.ru https://*.yandex.com https://yastatic.net https://*.yastatic.net https://cdn.jsdelivr.net https://cdn.bitrix24.ru https://cdn-ru.bitrix24.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://yastatic.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://mc.yandex.ru https://mc.yandex.com https://yandex.ru https://yandex.com https://*.yandex.ru https://*.yandex.com https://yastatic.net wss://mc.yandex.ru https://zerodolg.bitrix24.ru; frame-src 'self' https://www.google.com https://www.googletagmanager.com https://yandex.ru https://yandex.com https://mc.yandex.ru https://mc.yandex.com https://*.yandex.ru https://*.yandex.com https://yastatic.net https://*.yastatic.net;" always;

    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;

        # Charset
        charset utf-8;

        # Logging для staging (можно отключить в production)
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
    }

    server {
        listen 443 ssl http2;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # SSL Configuration (update with your certificates)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # Доверенный сертификат для проверки OCSP (промежуточный сертификат CA)
        ssl_trusted_certificate /etc/nginx/ssl/ca-certificates.crt;
        
        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify off;  # Отключаем строгую проверку stapling'а для избежания ошибок с самоподписанными сертификатами

        # Charset
        charset utf-8;

        # Logging для staging (можно отключить в production)
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # Extended caching for static assets with immutable headers
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|mp4|webm|ogg|ogv|eot|ttf|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept;
            access_log off;
        }

        # Cache CSS/JS with version hashing
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # Cache Astro assets with immutable headers
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # HTML файлы - не кэшируем
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # API endpoints (если есть)
        location /api/ {
            # Здесь можно настроить проксирование к API серверу
            # proxy_pass http://api-server:3000;
            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            
            # Для staging можно вернуть 404
            return 404;
        }

        # Основное правило - SPA routing
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # Специальные файлы
        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        location = /sitemap.xml {
            access_log off;
        }

        location = /sitemap-index.xml {
            access_log off;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Запрет доступа к скрытым файлам
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages (опционально)
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
