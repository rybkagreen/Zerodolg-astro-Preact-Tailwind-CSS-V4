# Nginx конфигурация для SSR Astro приложения в Docker
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
                   
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;
    
    # Основные настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    
    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
        
    # Безопасность
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP для staging с учетом Bitrix24, Google Analytics и Яндекс.Метрики
    # Note: 'unsafe-inline' для style-src необходим для inline стилей Astro
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://www.google-analytics.com https://www.googletagmanager.com https://mc.yandex.ru https://yandex.ru https://*.yandex.ru https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://mc.yandex.ru https://yandex.ru https://*.yandex.ru wss://mc.yandex.ru https://zerodolg.bitrix24.ru https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://www.google.com https://www.googletagmanager.com https://yandex.ru https://mc.yandex.ru https://*.yandex.ru;" always;
    
    # Основной сервер
    server {
        listen 4321;
        server_name localhost;
        
        # Корневая директория для статических файлов
        root /dist/client;
        
        # ========================================
        # СТАТИЧЕСКИЕ ФАЙЛЫ - Напрямую из файловой системы
        # ========================================
        
        # Обслуживание CSS, JS и других статических файлов
        location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot|otf)$ {
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Astro assets и chunks
        location /_astro/ {
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        location /chunks/ {
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Обслуживание assets из клиентской директории
        location /assets/ {
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Страницы HTML и общие статические файлы
        location ~* \.html$ {
            try_files $uri $uri/ =404;
        }
        
        # robots.txt и sitemap
        location = /robots.txt {
            try_files $uri $uri/ =404;
            access_log off;
            log_not_found off;
        }
        
        location = /sitemap-index.xml {
            try_files $uri $uri/ =404;
            access_log off;
            log_not_found off;
        }
        
        location ~ /sitemap {
            try_files $uri $uri/ =404;
        }
        
        # ========================================
        # API ENDPOINTS - Проксирование на SSR сервер Node.js
        # ========================================
        location /api/ {
            proxy_pass http://zerodolg-ssr-server:4322;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;
        }
        
        # ========================================
        # ДИНАМИЧЕСКИЕ СТРАНИЦЫ - Проксирование на SSR сервер Node.js
        # ========================================
        location / {
            # Сначала пробуем найти статический файл
            try_files $uri $uri.html $uri/ @ssr;
        }
        
        # Fallback на SSR сервер для динамических страниц
        location @ssr {
            proxy_pass http://zerodolg-ssr-server:4322;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;
        }
        
        # ========================================
        # ЗАЩИТА
        # ========================================
        
        # Защита системных файлов
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # favicon.ico
        location = /favicon.ico {
            try_files $uri =404;
            access_log off;
            log_not_found off;
        }
        
        # Health check
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}