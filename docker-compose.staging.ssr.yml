services:
  # SSR Server (Node.js with PM2)
  zerodolg-staging-ssr:
    build:
      context: .
      dockerfile: Dockerfile.staging.ssr
    container_name: zerodolg-staging-ssr
    restart: unless-stopped
    ports:
      - '3000:4321' # Expose on port 3000 for staging
    environment:
      # Environment variables для staging
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - PUBLIC_SITE_URL=http://localhost:3000
      - PUBLIC_GA_ID=${PUBLIC_GA_ID:-G-XXXXXXXXXX}
      - PUBLIC_YM_ID=${PUBLIC_YM_ID:-XXXXXXXXX}
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL:-}
      - PUBLIC_SITE_PHONE=+7 (495) 790-60-03
      - PUBLIC_SITE_EMAIL=info@zerodolg.ru
    volumes:
      # Логи для анализа
      - ./logs:/app/logs
    networks:
      - zerodolg-staging-ssr-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4321/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'com.zerodolg.environment=staging'
      - 'com.zerodolg.project=zerodolg-astro'
      - 'com.zerodolg.service=ssr-pm2'

  # Lighthouse CI для тестирования производительности
  lighthouse:
    image: patrickhulce/lhci-server:latest
    container_name: zerodolg-lighthouse-staging
    restart: unless-stopped
    ports:
      - '9001:9001'
    volumes:
      - lighthouse-staging-data:/data
    networks:
      - zerodolg-staging-ssr-network
    environment:
      - LHCI_STORAGE_SQLITE_DB_PATH=/data/lhci.db
    labels:
      - 'com.zerodolg.service=lighthouse'

networks:
  zerodolg-staging-ssr-network:
    driver: bridge
    name: zerodolg-staging-ssr-network

volumes:
  lighthouse-staging-data:
    name: zerodolg-lighthouse-staging-data
