services:
  # SSR Server (Node.js)
  zerodolg-ssr-server:
    build:
      context: .
      dockerfile: Dockerfile.ssr
    container_name: zerodolg-ssr-server
    restart: unless-stopped
    expose:
      - '4322'
    environment:
      # Environment variables для staging
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4322
      - PUBLIC_SITE_URL=http://localhost:3000
      - PUBLIC_GA_ID=${PUBLIC_GA_ID:-G-XXXXXXXXXX}
      - PUBLIC_YM_ID=${PUBLIC_YM_ID:-XXXXXXXXX}
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL:-}
      - PUBLIC_SITE_PHONE=+7 (905) 577-33-87
      - PUBLIC_SITE_EMAIL=info@zerodolg.ru
    volumes:
      # Логи для анализа
      - ./logs:/app/logs
    networks:
      - zerodolg-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4322/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'com.zerodolg.environment=staging'
      - 'com.zerodolg.project=zerodolg-astro'
      - 'com.zerodolg.service=ssr-server'

  # Основное приложение (Nginx + SSR Server)
  zerodolg-web:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: zerodolg-staging
    restart: unless-stopped
    ports:
      - '3000:4321'
    depends_on:
      - zerodolg-ssr-server
    environment:
      # Environment variables для staging
      - NODE_ENV=production
      - PUBLIC_SITE_URL=http://localhost:3000
      - PUBLIC_GA_ID=${PUBLIC_GA_ID:-G-XXXXXXXXXX}
      - PUBLIC_YM_ID=${PUBLIC_YM_ID:-XXXXXXXXX}
      - BITRIX24_WEBHOOK_URL=${BITRIX24_WEBHOOK_URL:-}
      - PUBLIC_SITE_PHONE=+7 (905) 577-33-87
      - PUBLIC_SITE_EMAIL=info@zerodolg.ru
    volumes:
      # Логи для анализа
      - ./logs:/app/logs
    networks:
      - zerodolg-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4321/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 'com.zerodolg.environment=staging'
      - 'com.zerodolg.project=zerodolg-astro'
      - 'com.zerodolg.service=web'

  # Lighthouse CI для тестирования производительности
  lighthouse:
    image: patrickhulce/lhci-server:latest
    container_name: zerodolg-lighthouse
    restart: unless-stopped
    ports:
      - '9001:9001'
    volumes:
      - lighthouse-data:/data
    networks:
      - zerodolg-network
    environment:
      - LHCI_STORAGE_SQLITE_DB_PATH=/data/lhci.db
    labels:
      - 'com.zerodolg.service=lighthouse'

  # Дополнительный сервис для мониторинга (опционально)
  # cadvisor:
  #   image: gcr.io/cadvisor/cadvisor:latest
  #   container_name: zerodolg-monitoring
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - /:/rootfs:ro
  #     - /var/run:/var/run:ro
  #     - /sys:/sys:ro
  #     - /var/lib/docker/:/var/lib/docker:ro
  #   networks:
  #     - zerodolg-network
  #   privileged: true
  #   devices:
  #     - /dev/kmsg

networks:
  zerodolg-network:
    driver: bridge
    name: zerodolg-staging-network

volumes:
  lighthouse-data:
    name: zerodolg-lighthouse-data
