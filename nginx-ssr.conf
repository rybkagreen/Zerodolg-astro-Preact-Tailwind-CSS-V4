# Конфигурация nginx для SSR Astro приложения
# Этот файл нужно добавить в /etc/nginx/sites-available/zerodolg.ru

# HTTP сервер - обслуживает robots.txt, sitemap.xml и favicon.ico без редиректа, остальное перенаправляет на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name zerodolg.ru www.zerodolg.ru;
    
    # Обслуживаем robots.txt без редиректа
    location = /robots.txt {
        root /var/www/zerodolg.ru/public_html;
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }
    
    # Обслуживаем sitemap.xml и другие карты сайта без редиректа
    location ~* ^/sitemap.*\.xml$ {
        root /var/www/zerodolg.ru/public_html;
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }
    
    # Обслуживаем favicon.ico без редиректа
    location = /favicon.ico {
        root /var/www/zerodolg.ru/public_html;
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }
    
    # Все остальное перенаправляем на HTTPS
    location / {
        return 301 https://zerodolg.ru$request_uri;
    }
}

# Редирект с HTTPS www на без www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.zerodolg.ru;
    
    # SSL сертификаты
    ssl_certificate /etc/ssl/certs/zerodolg.ru.crt;
    ssl_certificate_key /etc/ssl/private/zerodolg.ru.key;
    
    return 301 https://zerodolg.ru$request_uri;
}

# Основной HTTPS сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zerodolg.ru;
    
    # SSL конфигурация
    ssl_certificate /etc/ssl/certs/zerodolg.ru.crt;
    ssl_certificate_key /etc/ssl/private/zerodolg.ru.key;
    
    # SSL параметры
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Безопасность - Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP для ZeroDolg.ru с учетом Bitrix24, Google Analytics и Яндекс.Метрики
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://www.google-analytics.com https://www.googletagmanager.com https://mc.yandex.ru https://yandex.ru https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://mc.yandex.ru https://zerodolg.bitrix24.ru https://www.google-analytics.com https://region1.google-analytics.com wss://mc.yandex.ru; frame-src 'self' https://www.google.com https://yandex.ru https://mc.yandex.ru https://*.yandex.ru;" always;
    
    # Логирование
    access_log /var/log/nginx/zerodolg-access.log;
    error_log /var/log/nginx/zerodolg-error.log;
    
    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml text/x-js text/x-cross-domain-policy application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject font/woff font/woff2;
    
    # ========================================
    # API ENDPOINTS - Проксирование на Node.js сервер
    # ========================================
    location /api/ {
        # Проксирование на локальный Node.js сервер
        proxy_pass http://127.0.0.1:4321;
        
        # Заголовки для проксирования
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферизация
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Отключаем добавление слеша в конце
        proxy_redirect off;
    }
    
    # ========================================
    # СТАТИЧЕСКИЕ ФАЙЛЫ от Astro (assets, chunks, etc.)
    # ========================================
    
    # Кеширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        root /var/www/zerodolg.ru/public_html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # Astro assets и chunks
    location /_astro/ {
        root /var/www/zerodolg.ru/public_html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    location /chunks/ {
        root /var/www/zerodolg.ru/public_html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    location /assets/ {
        root /var/www/zerodolg.ru/public_html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # ========================================
    # ДИНАМИЧЕСКИЕ СТРАНИЦЫ - Проксирование на SSR сервер
    # ========================================
    location / {
        # Сначала пробуем найти статический файл
        root /var/www/zerodolg.ru/public_html;
        try_files $uri $uri.html $uri/ @ssr;
    }
    
    # Fallback на SSR сервер для динамических страниц
    location @ssr {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_redirect off;
    }
    
    # ========================================
    # ЗАЩИТА И БЕЗОПАСНОСТЬ
    # ========================================
    
    # Защита системных файлов
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Блокировка доступа к конфиденциальным файлам
    location ~* \.(log|sql|conf|yml|yaml|ini|env|git|svn|htaccess|htpasswd|key|crt|pem)$ {
        deny all;
    }
    
    # Блокировка доступа к исходным файлам
    location ~ ^/(src|scripts|node_modules|package\.json|package-lock\.json|vite\.config\.js|webpack\.config\.js)/ {
        deny all;
    }
    
    # robots.txt
    location = /robots.txt {
        root /var/www/zerodolg.ru/public_html;
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }
    
    # favicon.ico
    location = /favicon.ico {
        root /var/www/zerodolg.ru/public_html;
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }
    
    # Страницы ошибок
    error_page 404 /errors/404.html;
    error_page 403 /errors/403.html;
    error_page 500 502 503 504 /errors/500.html;
    
    location ^~ /errors/ {
        internal;
        root /var/www/zerodolg.ru/public_html;
    }
    
    # Лимиты
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
}
